<style>
    .dartboard {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: red;           /* outer circle */
  position: relative;
}

.dartboard::before {
  content: "";
  position: absolute;
  margin: 20px;
  width: calc(100% - 40px);
  height: calc(100% - 40px);
  border-radius: 50%;
  background: white;        /* middle circle */
}

.dartboard::after {
  content: "";
  position: absolute;
  margin: 50px;
  width: calc(100% - 100px);
  height: calc(100% - 100px);
  border-radius: 50%;
  background: red;          /* innermost circle */
}

</style>
<div class="dartboard"></div>
